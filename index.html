<!doctype html>
<html lang="en">
  <head>
    <!-- sets the icon of the browser tab -->
    <link rel="icon" href="favicon.jpeg" type="image/x-icon" />
    <meta charset="UTF-8" />
    <!-- sets the page width according to device width -->
    <!--initial-scale=1.0->Do NOT zoom in or zoom out when page loads  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 
    <meta name="description">
    ->gives a short summary of your website to search engines like Google.
    It appears in Google search results below your website title.
    If you leave it empty->
    then Google will:
         Automatically pick random text from your page
         Or show nothing meaningful
    
    <meta content="" name="keywords" />
    (*)To understand what your website was about.
    (*)Google does NOT use meta keywords anymore.
    Why?
      Because people abused it by stuffing fake keywords.
    -->
    <meta content="" name="description" />
    <meta content="" name="keywords" />
    <title>Personal Portfolio</title>
  </head>
  <body></body>
</html>
